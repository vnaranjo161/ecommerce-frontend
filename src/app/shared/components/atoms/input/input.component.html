<input
  [id]="id()"
  [type]="type()"
  [placeholder]="placeholder()"
  [formControl]="control()"
  class="w-full rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:border-transparent"
  [ngClass]="control().touched && control().invalid
    ? 'border border-red-400 focus:ring-red-400'
    : 'border border-gray-300 focus:ring-blue-500'"
/>
