<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

  @if (errorMessage()) {
    <app-alert [message]="errorMessage()!" (closed)="errorMessage.set(null)" />
  }

  <app-form-field
    label="Nombre:"
    inputId="name"
    placeholder="Nombre completo"
    patternError="Este campo debe contener únicamente letras"
    [control]="form.controls.name"
  />
  <app-form-field
    label="Correo electrónico"
    inputId="email"
    inputType="email"
    placeholder="correo@ejemplo.com"
    [control]="form.controls.email"
  />
  <app-form-field
    label="Contraseña"
    inputId="password"
    inputType="password"
    placeholder="••••••••"
    [control]="form.controls.password"
  />
  <div class="mt-2">
    <app-button label="Registrarme" type="submit" />
  </div>
</form>
