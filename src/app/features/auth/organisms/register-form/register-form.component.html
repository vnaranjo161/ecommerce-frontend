<form class="flex flex-col gap-4">
  <app-form-field
    label="Nombre:"
    inputId="name"
    placeholder="Nombre completo"
  />
  <app-form-field
    label="Correo electrónico"
    inputId="email"
    inputType="email"
    placeholder="correo@ejemplo.com"
  />
  <app-form-field
    label="Contraseña"
    inputId="password"
    inputType="password"
    placeholder="••••••••"
  />
  <div class="mt-2">
    <app-button label="Registrarme" type="submit" />
  </div>
</form>
