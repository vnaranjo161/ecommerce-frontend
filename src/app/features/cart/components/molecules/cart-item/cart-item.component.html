<div class="py-4 border-b border-gray-200 last:border-0 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 sm:gap-4">

  <div class="flex-1 min-w-0">
    <p class="font-medium text-gray-800 truncate">{{ item().productName }}</p>
    <p class="text-sm text-gray-400">{{ item().unitPrice | currency:'COP':'code':'1.0-0' }} c/u</p>
  </div>

  <div class="flex items-center justify-between sm:justify-end gap-3 sm:gap-4">
    <div class="flex items-center gap-2">
      <button
        (click)="onDecrease()"
        class="w-8 h-8 rounded-full border border-gray-300 text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer flex items-center justify-center">
        −
      </button>
      <span class="w-6 text-center font-medium text-gray-800">{{ item().quantity }}</span>
      <button
        (click)="onIncrease()"
        class="w-8 h-8 rounded-full border border-gray-300 text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer flex items-center justify-center">
        +
      </button>
    </div>

    <p class="text-blue-600 font-semibold text-right">
      {{ item().subtotal | currency:'COP':'code':'1.0-0' }}
    </p>

    <button
      (click)="onRemove()"
      class="text-red-400 hover:text-red-600 transition-colors cursor-pointer text-sm shrink-0">
      Eliminar
    </button>
  </div>

</div>
